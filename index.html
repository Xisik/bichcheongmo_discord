  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    /* ── Header ── */
    .site-header {
      background: rgba(26, 26, 46, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 0 1.5rem;
    }
    .header-bar {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      height: 60px;
    }
    .brand-link { display: flex; align-items: center; }
    .logo {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
    }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }
    .discord-card {
      text-align: center;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      animation: fadeUp 0.6s ease both;
    }
    .logo-wrap {
      width: clamp(72px, 20vw, 100px);
      height: clamp(72px, 20vw, 100px);
      border-radius: 50%;
      overflow: hidden;
      animation: pulse 1.8s ease-in-out infinite;
      box-shadow: 0 0 0 5px rgba(88, 101, 242, 0.28);
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }

    h1 { font-size: clamp(1.15rem, 5vw, 1.5rem); font-weight: 700; }
    .desc { font-size: clamp(0.83rem, 3.5vw, 0.93rem); color: #a0aec0; }

    .progress-bar {
      width: 100%;
      max-width: 220px;
      height: 4px;
      background: #2d2d4e;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #5865F2, #7289da);
      animation: fill 3s linear forwards;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 clamp(20px, 6vw, 28px);
      background: #5865F2;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: clamp(0.88rem, 3.5vw, 0.95rem);
      font-weight: 600;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:hover  { background: #4752c4; transform: translateY(-1px); }
    .btn:active { transform: scale(0.97); }

    /* ── Footer ── */
    .site-footer {
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 1.5rem;
      text-align: center;
      font-size: 0.82rem;
      color: #718096;
      line-height: 1.8;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.055); }
    }
    @keyframes fill {
      from { width: 0%; }
      to   { width: 100%; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-bar">
      <a class="brand-link" href="https://bichcheongmo.org" aria-label="빛청모 홈으로">
        <img class="logo" src="./logo.jpg" alt="빛청모" />
      </a>
    </div>
  </header>

  <main>
    <div class="discord-card">
      <div class="logo-wrap">
        <img src="./logo.jpg" alt="빛청모 로고" />
      </div>

      <h1>Discord 서버로 이동 중...</h1>
      <p class="desc">3초 후 자동으로 이동합니다.</p>

      <div class="progress-bar" role="progressbar" aria-label="이동 대기 중">
        <div class="progress-fill"></div>
      </div>

      <a class="btn" href="https://discord.gg/dhyaWzEuK2">지금 바로 이동 →</a>
    </div>
  </main>

  <footer class="site-footer">
    <p>사업자번호 231-82-77851 · Shining Us, LGBTQ Youth</p>
    <p>본 단체는 법인 단체로써 고유사업 외의 수익 사업을 영위하지 않습니다</p>
    <p>© 빛청모</p>
  </footer>

  <script>
    setTimeout(() => {
      window.location.href = "https://discord.gg/dhyaWzEuK2";
    }, 3000);
  </script>

</body>
</html>
