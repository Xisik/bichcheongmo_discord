<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="3;url=https://discord.gg/서버코드">
  <title>빛청모 Discord</title>

  <!-- ✅ Favicon -->
  <link rel="icon" type="image/jpeg" href="logo.jpg">
  <link rel="apple-touch-icon" href="logo.jpg">

  <!-- ✅ Open Graph (카카오톡, 트위터, 디스코드 등 미리보기) -->
  <meta property="og:title" content="Discord 서버에 참가하세요!">
  <meta property="og:description" content="링크를 클릭하면 Discord 서버로 이동합니다.">
  <meta property="og:image" content="logo.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://discord.bichcheongmo.org">

  <!-- ✅ Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Discord 서버에 참가하세요!">
  <meta name="twitter:description" content="링크를 클릭하면 Discord 서버로 이동합니다.">
  <meta name="twitter:image" content="logo.jpg">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
      padding: 24px;
    }

    .container {
      text-align: center;
      animation: fadeIn 0.6s ease;
      width: 100%;
      max-width: 400px;
    }

    .logo-wrap {
      width: clamp(64px, 20vw, 96px);
      height: clamp(64px, 20vw, 96px);
      margin: 0 auto 24px;
      border-radius: 50%;
      overflow: hidden;
      animation: pulse 1.5s infinite;
      box-shadow: 0 0 0 4px rgba(88,101,242,0.3);
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-size: clamp(1.2rem, 5vw, 1.6rem);
      font-weight: 700;
      margin-bottom: 8px;
    }

    p {
      font-size: clamp(0.85rem, 3.5vw, 0.95rem);
      color: #a0aec0;
      margin-bottom: 32px;
    }

    .progress-bar {
      width: 100%;
      max-width: 240px;
      height: 4px;
      background: #2d2d4e;
      border-radius: 99px;
      margin: 0 auto 24px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #5865F2, #7289da);
      border-radius: 99px;
      animation: fill 3s linear forwards;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 clamp(20px, 6vw, 28px);
      background: #5865F2;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: clamp(0.88rem, 3.5vw, 0.95rem);
      font-weight: 600;
      min-height: 44px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover  { background: #4752c4; transform: translateY(-1px); }
    .btn:active { transform: scale(0.97); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.06); }
    }
    @keyframes fill {
      from { width: 0%; }
      to   { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-wrap">
      <img src="logo.jpg" alt="서버 로고">
    </div>

    <h1>Discord 서버로 이동 중...</h1>
    <p>3초 후 자동으로 이동합니다.</p>

    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>

    <a class="btn" href="https://discord.gg/서버코드">지금 바로 이동 →</a>
  </div>

  <script>
    setTimeout(() => {
      window.location.href = "https://discord.gg/서버코드";
    }, 3000);
  </script>
</body>
</html>
